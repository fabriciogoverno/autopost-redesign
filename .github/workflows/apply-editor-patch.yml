name: Apply Editor Patch (CORS fix)

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'autopost-ururau/src/dashboard/app/editor/page.jsx'
      - 'autopost-ururau/src/dashboard/lib/imgProxy.js'

jobs:
  patch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Apply patch (idempotent)
        id: patch
        run: |
          FILE="autopost-ururau/src/dashboard/app/editor/page.jsx"
          if [ ! -f "$FILE" ]; then
            echo "File not found, skipping"
            echo "changed=0" >> $GITHUB_OUTPUT
            exit 0
          fi
          CHANGED=0

          # Patch 1: importar proxiedUrl se ainda não existir
          if ! grep -q "from '@/lib/imgProxy'" "$FILE"; then
            sed -i "/^} from 'lucide-react';$/a import { proxiedUrl } from '@/lib/imgProxy';" "$FILE"
            CHANGED=1
            echo "Patch 1 aplicado: import proxiedUrl"
          else
            echo "Patch 1 já aplicado"
          fi

          # Patch 2: trocar primeira ocorrência de 'img.src = src;' por 'img.src = proxiedUrl(src);'
          if grep -q "img.src = src;" "$FILE"; then
            python3 <<PYEOF
import re
file = "$FILE"
content = open(file).read()
idx = content.find('img.src = src;')
if idx > 0:
    new = content[:idx] + 'img.src = proxiedUrl(src);' + content[idx + len('img.src = src;'):]
            open(file, 'w').write(new)
            print('Patch 2 aplicado: primeira img.src usa proxiedUrl')
PYEOF
            CHANGED=1
          else
            echo "Patch 2 já aplicado"
          fi

          echo "changed=$CHANGED" >> $GITHUB_OUTPUT

      - name: Commit changes
        if: steps.patch.outputs.changed == '1'
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: 'fix(editor): aplica proxiedUrl em setArticleImage (CORS fix)'
