name: CI - Ururau Reels

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install dependencies
        run: npm install
      - name: Initialize database
        run: node src/db.js --init
      - name: Run tests
        run: npm test
      - name: Verify template exists
        run: |
          test -f templates/ururau-reels.json
          test -f public/assets/template-base.png
